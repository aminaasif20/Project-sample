version: '3.8'
services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: taskflow-backend
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_ACCESS_SECRET: super-secret-access
      JWT_REFRESH_SECRET: super-secret-refresh
      CLIENT_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mongo-data:
